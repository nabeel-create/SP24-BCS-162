name: health_scale
description: BMI Calculator - a faithful Flutter conversion of the Health-Scale Expo React Native app. Three tabs (Calculator, History, Profile) with animated arc gauge, ruler pickers, theming, and persistent storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  feather_icons: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
