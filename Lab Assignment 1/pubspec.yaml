name: doctor2
description: Patient management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.3
  image_picker: ^1.2.1
  file_picker: ^8.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_vector_icons: ^2.0.0
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

